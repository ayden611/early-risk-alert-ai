<!DOCTYPE html>
<html>
<head>
    <title>Early Risk Alert AI – Demo Access</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b1b2b;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .login-box {
            background: #132f4c;
            width: 350px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background-color: #00c2ff;
            color: black;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #00a6d6;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Early Risk Alert AI</h2>
        <h3>Secure Demo Access</h3>

        <input type="text" placeholder="Email Address" />
        <input type="password" placeholder="Password" />

        <button onclick="window.location.href='/dashboard'">
            Access Live Demo
        </button>

        <p style="margin-top:20px; font-size:12px;">
            Authorized hospital staff, providers, and partners only.
        </p>
    </div>
</body>
</html>
